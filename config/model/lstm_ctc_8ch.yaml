# @package _global_
# LSTM for 8-channel input; use with transforms=log_spectrogram_8ch
module:
  _target_: emg2qwerty.lightning.LSTMCTCModule_8ch
  in_features: 264  # 33 freq * 8 channels
  mlp_features: [384]
  lstm_hidden_size: 256
  lstm_num_layers: 2
  lstm_dropout: 0.10

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]